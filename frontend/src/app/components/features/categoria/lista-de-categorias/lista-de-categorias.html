<div class="mb-3">
  <div class="container">
    <div class="card border-succes text-center">
      <div class="card-header text-primary">
        <h2 class="card-title">
          {{pageTitle}}
        </h2>
      </div>
      <div class="card-body text-primary">
        <table class="table table-stripped">
          <thead>
            <tr>
              <th>idCategoria</th>
              <th>nombre</th>
              <th>descripcion</th>
              <th colspan="2">acciones</th>
            </tr>
          </thead>
          <tbody>
            @for (category of registeredCategories(); track category.idCategoria) {
              <tr>
                <td>{{category.idCategoria}}</td>
                <td>{{category.nombreCategoria}}</td>
                <td>{{category.descripcionCategoria}}</td>
                <td>
                  <button class="btn btn-outline-success"
                   [routerLink]="['/categoriaForm',category.idCategoria]">
                  Actualizar
                </button>
                </td>
                <td>
                  <button class="btn btn-outline-danger" (click)="deleteCategory(category)" >Eliminar</button>
                </td>
              </tr>
            }@empty {
              <div class="alert alert-primary" role="alert">
                    No hay categorias registradas
              </div>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
